# Local development stack for papr.
# Api (FastAPI BFF) and Web (React SPA) are being rebuilt from scratch — their
# services will be re-added here as they come back. The MCP server is shelved for
# later. Until then the agent runs standalone.
services:
  # papr deep agent on the local LangGraph Agent Server.
  agent:
    build: ./Agent
    env_file: ./Agent/.env
    ports:
      - "2024:2024"
    volumes:
      # Mount source for hot reload. (Skills now live in the per-user store.)
      - ./Agent:/app
