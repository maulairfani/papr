name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Web/package-lock.json
      - run: npm ci
      - run: npm run build

  api:
    name: api (import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r Api/requirements.txt
      - name: import check
        working-directory: Api
        run: python -c "import app.main"

  agent:
    name: agent (import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ./Agent
      - name: import check
        env:
          OPENAI_API_KEY: ci-dummy-key
        run: python -c "from papr.agent import agent"
